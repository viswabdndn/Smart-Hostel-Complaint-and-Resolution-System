# ============================================================
#  Smart Hostel - Spring Boot + SQLite + JPA configuration
# ============================================================

# Server
server.port=8080

# --- SQLite Datasource ---
# The DB file is created in the project root on first startup.
spring.datasource.url=jdbc:sqlite:smarthostel.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# --- JPA / Hibernate ---
# Community SQLite dialect is provided by hibernate-community-dialects.
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Auto create/update tables from @Entity definitions.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQLite does not need a connection validation query, keep it simple.
spring.datasource.hikari.maximum-pool-size=1

# Static resources (HTML pages) are served from src/main/resources/static
spring.web.resources.static-locations=classpath:/static/
